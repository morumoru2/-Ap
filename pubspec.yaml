name: oshi_memo
description: "推し活情報をシンプル・高速・安全に管理できる個人向け推し活アプリ"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状態管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ローカルDB
  drift: ^2.26.0
  sqlite3_flutter_libs: ^0.5.28

  # HTTP通信
  dio: ^5.7.0

  # RSS/XML解析
  xml: ^6.5.0

  # 画面遷移
  go_router: ^14.8.1

  # 画像キャッシュ
  cached_network_image: ^3.4.1

  # 画像ピッカー
  image_picker: ^1.1.2

  # パスプロバイダー
  path_provider: ^2.1.5

  # 国際化
  intl: ^0.20.2

  # Google Fonts
  google_fonts: ^6.2.1

  # UUID
  uuid: ^4.5.1

  # URL Launcher
  url_launcher: ^6.3.1

  # ローカル通知
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.0

  # 設定永続化
  shared_preferences: ^2.5.3

  # カレンダー
  table_calendar: ^3.2.0

  # ホーム画面 Widget
  home_widget: ^0.7.0

  # Background Fetch
  workmanager: ^0.6.0

  # パス結合
  path: ^1.9.1
  flutter_timezone: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Drift コード生成
  drift_dev: ^2.26.0
  build_runner: ^2.4.14

  # Riverpod コード生成
  riverpod_generator: ^2.6.4
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.4

flutter:
  uses-material-design: true
